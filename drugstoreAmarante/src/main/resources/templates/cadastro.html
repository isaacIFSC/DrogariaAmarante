<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>DrogariaAmarante | Cadastro</title>
    <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body class="auth-page">
<main class="auth-main" role="main">
    <section class="auth-card" aria-label="Acesso a conta">
        <header class="auth-header">
            <h1>Cadastrar usuário</h1>
        </header>

        <form th:action="@{/cadastro}" method="post" th:object="${user}">
            <label class="field">
                <span>CPF</span>
                <input type="text" th:field="*{cpf}" required>
            </label>

            <label class="field">
                <span>Nome</span>
                <input type="text" th:field="*{firstName}" required>
            </label>

            <label class="field">
                <span>Sobrenome</span>
                <input type="text" th:field="*{lastName}" required>
            </label>

            <div class="row-fields">
                <label class="field">
                    <span>Data de Nascimento</span>
                    <input type="date" th:field="*{birthDate}" required>
                </label>

                <label class="field">
                    <span>Genero</span>
                    <select th:field="*{gender}">
                        <option value="">Selecione</option>
                        <option value="FEMININO">Feminino</option>
                        <option value="MASCULINO">Masculino</option>
                        <option value="OUTRO">Outro</option>
                    </select>
                </label>
            </div>

            <label class="field">
                <span>Telefone Celular</span>
                <input type="text" th:field="*{phone}">
            </label>

            <label class="field">
                <span>Email</span>
                <input type="email" th:field="*{email}" required>
            </label>

            <label class="field">
                <span>Senha</span>
                <input type="password" th:field="*{password}" required>
            </label>

            <button type="submit" class="btn-primary">Cadastrar</button>

            <p th:if="${param.erro}" style="color:red;">
                Erro
            </p>

            <div class="auth-footer">
                <a th:href="@{/login}" class="link">Voltar para login</a>
            </div>
        </form>
    </section>
</main>

<footer class="auth-site-footer">
    <div class="logo">
        <a class="logo" th:href="@{/}">
            <span class="logo-mark">DA</span>
            <span class="logo-text">Drogaria <span>Amarante</span></span>
        </a>
    </div>
</footer>
</body>
</html>
